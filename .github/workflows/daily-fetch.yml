name: Daily KPL Data Fetch

on:
  schedule:
    # UTC 时间 00:00 (北京时间 08:00)
    - cron: '16 1 * * *'
  workflow_dispatch:
    inputs:
      season:
        description: '指定历史赛季 ID（如 KPL2026S1），留空则只跑当前赛季'
        required: false
        type: string
      publish_historical:
        description: '是否生成并提交 data/seasons/{season}/'
        required: false
        type: boolean
        default: false
      dry_run:
        description: '只生成和校验，不提交'
        required: false
        type: boolean
        default: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # 设置超时时间，避免长时间挂起

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Fetch data
        id: fetch
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          # 当前赛季（日常）
          python main.py

          # 历史赛季归档（手动触发时）
          if [ "${{ inputs.publish_historical }}" == "true" ] && [ -n "${{ inputs.season }}" ]; then
            echo "::group::Generating historical season ${{ inputs.season }}"
            python post_process.py -s "${{ inputs.season }}"
            echo "::endgroup::"
          fi
          echo "fetch_result=$?" >> $GITHUB_OUTPUT

      - name: Backfill missing historical seasons
        if: inputs.publish_historical != 'true'
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          echo "::group::Backfill historical seasons"
          python scripts/backfill-seasons.py
          echo "::endgroup::"

      - name: Validate historical season files
        if: inputs.publish_historical == 'true' && inputs.season != ''
        run: |
          SEASON="${{ inputs.season }}"
          MANIFEST="data/seasons/${SEASON}/manifest.json"
          if [ ! -f "$MANIFEST" ]; then
            echo "::error::Manifest not found: $MANIFEST"
            exit 1
          fi
          FILE_COUNT=$(python3 -c "import json; m=json.load(open('$MANIFEST')); print(m['file_count'])")
          echo "Manifest indexes $FILE_COUNT files"
          if [ "$FILE_COUNT" -lt 5 ]; then
            echo "::error::Manifest file_count too low: $FILE_COUNT"
            exit 1
          fi
          # Verify key derived files exist
          for f in abilities ranking heroes win-lose insights; do
            if [ ! -f "data/seasons/${SEASON}/derived/${f}.json" ]; then
              echo "::error::Missing derived file: data/seasons/${SEASON}/derived/${f}.json"
              exit 1
            fi
          done
          echo "✅ Historical season ${SEASON} validation passed (${FILE_COUNT} files)"

      - name: Check for changes
        id: changes
        run: |
          git add data/
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            echo "::notice::Dry run — skipping commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          elif git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push data
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "chore: auto fetch kpl data $(date +%Y%m%d) [skip ci]"
          git push

      - name: Sync data to CloudBase cloud storage
        if: inputs.dry_run != 'true'
        continue-on-error: true
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: |
          echo "::group::Syncing to CloudBase ($TCB_ENV_ID)"
          npm install -g @cloudbase/cli
          tcb login --apiKeyId "$TCB_SECRET_ID" --apiKey "$TCB_SECRET_KEY"
          SEASON=$(python3 -c "import json; print(json.load(open('data/latest/current-season.json'))['current'])")
          echo "Current season: $SEASON"
          # Entry files
          tcb storage upload data/latest/current-season.json \
            data/latest/current-season.json -e "$TCB_ENV_ID"
          tcb storage upload data/latest/seasons-list.json \
            data/latest/seasons-list.json -e "$TCB_ENV_ID"
          # Derived data
          for f in overview heroes win-lose ranking abilities insights; do
            FILE="data/derived/$SEASON/$f.json"
            if [ -f "$FILE" ]; then
              tcb storage upload "$FILE" \
                "data/derived/$SEASON/$f.json" -e "$TCB_ENV_ID"
              echo "  ✅ $f"
            else
              echo "  ⚠️ $FILE not found, skipped"
            fi
          done
          echo "::endgroup::"
          echo "✅ CloudBase sync complete"

      - name: Report status
        if: always()
        run: |
          if [ "${{ steps.fetch.outcome }}" == "failure" ]; then
            echo "::warning::数据采集部分失败，但已提交成功采集的数据"
          else
            echo "数据采集完成"
          fi
