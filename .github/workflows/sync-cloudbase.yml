name: Sync to CloudBase

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync data to CloudBase cloud storage
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: |
          echo "::group::Syncing to CloudBase ($TCB_ENV_ID)"
          npm install -g @cloudbase/cli
          tcb login --apiKeyId "$TCB_SECRET_ID" --apiKey "$TCB_SECRET_KEY"
          SEASON=$(python3 -c "import json; print(json.load(open('data/latest/current-season.json'))['current'])")
          echo "Current season: $SEASON"
          # Entry files
          tcb storage upload data/latest/current-season.json \
            -d data/latest/current-season.json -e "$TCB_ENV_ID"
          tcb storage upload data/latest/seasons-list.json \
            -d data/latest/seasons-list.json -e "$TCB_ENV_ID"
          # Derived data
          for f in overview heroes win-lose ranking abilities insights; do
            FILE="data/derived/$SEASON/$f.json"
            if [ -f "$FILE" ]; then
              tcb storage upload "$FILE" \
                -d "data/derived/$SEASON/$f.json" -e "$TCB_ENV_ID"
              echo "  ✅ $f"
            else
              echo "  ⚠️ $FILE not found, skipped"
            fi
          done
          echo "::endgroup::"
          echo "✅ CloudBase sync complete"
