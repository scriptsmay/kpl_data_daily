name: Sync Schedule to CloudBase

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Fetch KPL schedule
        id: fetch
        run: |
          echo "::group::Fetching KPL schedule"
          python scripts/fetch-schedule.py
          echo "::endgroup::"

      - name: Verify schedule file
        id: verify
        run: |
          SEASON=$(python3 -c "import json; print(json.load(open('data/latest/current-season.json'))['current'])")
          FILE="data/derived/$SEASON/schedule.json"
          if [ ! -f "$FILE" ]; then
            echo "::error::schedule.json not found at $FILE"
            exit 1
          fi
          MATCH_COUNT=$(python3 -c "import json; print(len(json.load(open('$FILE'))['matches']))")
          if [ "$MATCH_COUNT" -eq 0 ]; then
            echo "::error::schedule.json has 0 matches"
            exit 1
          fi
          echo "season=$SEASON" >> $GITHUB_OUTPUT
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "match_count=$MATCH_COUNT" >> $GITHUB_OUTPUT
          echo "✅ schedule.json verified: $MATCH_COUNT matches"

      - name: Push schedule to cheer-service
        id: push
        env:
          CHEER_API_URL: ${{ secrets.CHEER_API_URL }}
          CHEER_SYNC_KEY: ${{ secrets.CHEER_SYNC_KEY }}
        run: |
          echo "::group::Pushing schedule to cheer-service"
          SEASON="${{ steps.verify.outputs.season }}"
          FILE="${{ steps.verify.outputs.file }}"
          # Build JSON payload: { season, schedule }
          python3 -c "
          import json, sys
          season = '$SEASON'
          schedule = json.load(open('$FILE'))
          payload = json.dumps({'season': season, 'schedule': schedule})
          sys.stdout.write(payload)
          " > /tmp/schedule_payload.json
          RESPONSE=$(curl -s -w "\\n%{http_code}" -X POST "$CHEER_API_URL/api/admin/sync/schedule" \
            -H "Content-Type: application/json" \
            -H "x-sync-key: $CHEER_SYNC_KEY" \
            -d @/tmp/schedule_payload.json)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP $HTTP_CODE: $BODY"
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "success=true" >> $GITHUB_OUTPUT
            echo "✅ Schedule pushed successfully"
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "::warning::Push returned HTTP $HTTP_CODE"
          fi
          echo "::endgroup::"

      - name: Commit schedule data
        if: success()
        run: |
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git commit -m "chore: auto sync schedule $(date +%Y%m%d) [skip ci]"
            git push
          fi

      - name: Report status
        if: always()
        run: |
          if [ "${{ steps.fetch.outcome }}" == "failure" ]; then
            echo "::error::Schedule fetch failed"
            exit 1
          elif [ "${{ steps.push.outcome }}" == "failure" ]; then
            echo "::error::Schedule push to cheer-service failed"
            exit 1
          else
            echo "✅ Schedule sync completed successfully"
          fi
