name: Sync Schedule to CloudBase

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Fetch KPL schedule
        id: fetch
        run: |
          echo "::group::Fetching KPL schedule"
          python scripts/fetch-schedule.py
          echo "::endgroup::"

      - name: Verify schedule file
        id: verify
        run: |
          SEASON=$(python3 -c "import json; print(json.load(open('data/latest/current-season.json'))['current'])")
          FILE="data/derived/$SEASON/schedule.json"
          if [ ! -f "$FILE" ]; then
            echo "::error::schedule.json not found at $FILE"
            exit 1
          fi
          MATCH_COUNT=$(python3 -c "import json; print(len(json.load(open('$FILE'))['matches']))")
          if [ "$MATCH_COUNT" -eq 0 ]; then
            echo "::error::schedule.json has 0 matches"
            exit 1
          fi
          echo "season=$SEASON" >> $GITHUB_OUTPUT
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "match_count=$MATCH_COUNT" >> $GITHUB_OUTPUT
          echo "✅ schedule.json verified: $MATCH_COUNT matches"

      - name: Upload schedule to CloudBase
        id: upload
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: |
          echo "::group::Uploading schedule to CloudBase"
          npm install -g @cloudbase/cli
          tcb login --apiKeyId "$TCB_SECRET_ID" --apiKey "$TCB_SECRET_KEY"
          tcb storage upload "${{ steps.verify.outputs.file }}" \
            "data/derived/${{ steps.verify.outputs.season }}/schedule.json" -e "$TCB_ENV_ID"
          echo "✅ schedule.json uploaded"
          echo "::endgroup::"

      - name: Trigger CloudBase sync-schedule Event Function
        id: invoke
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: |
          echo "::group::Invoking sync-schedule Event Function"
          tcb fn invoke sync-schedule --envId "$TCB_ENV_ID"
          echo "✅ sync-schedule invoked"
          echo "::endgroup::"

      - name: Commit schedule data
        if: success()
        run: |
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git commit -m "chore: auto sync schedule $(date +%Y%m%d) [skip ci]"
            git push
          fi

      - name: Report status
        if: always()
        run: |
          if [ "${{ steps.fetch.outcome }}" == "failure" ]; then
            echo "::error::Schedule fetch failed"
            exit 1
          elif [ "${{ steps.upload.outcome }}" == "failure" ]; then
            echo "::error::CloudBase upload failed"
            exit 1
          elif [ "${{ steps.invoke.outcome }}" == "failure" ]; then
            echo "::error::sync-schedule function invoke failed"
            exit 1
          else
            echo "✅ Schedule sync completed successfully"
          fi
