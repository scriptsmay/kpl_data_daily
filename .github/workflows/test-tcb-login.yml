name: Test TCB Login

on:
  workflow_dispatch:

jobs:
  test-login:
    runs-on: ubuntu-latest
    steps:
      - name: Test CloudBase login
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
        run: |
          echo "::group::Environment Info"
          echo "Node: $(node --version)"
          echo "npm: $(npm --version)"
          echo "Runner IP: $(curl -s ifconfig.me)"
          echo "::endgroup::"

          echo "::group::Install CloudBase CLI"
          npm install -g @cloudbase/cli
          echo "::endgroup::"

          echo "::group::CLI Version"
          tcb --version
          echo "::endgroup::"

          echo "::group::Secrets Check"
          echo "TCB_SECRET_ID length: ${#TCB_SECRET_ID}"
          echo "TCB_SECRET_KEY length: ${#TCB_SECRET_KEY}"
          echo "::endgroup::"

          echo "::group::Network Test"
          echo "--- DNS: cloudbase.net ---"
          nslookup cloudbase.net || true
          echo "--- DNS: tencentcloud.com ---"
          nslookup tencentcloud.com || true
          echo "--- HTTPS: cloudbase.net ---"
          curl -sI https://cloudbase.net 2>&1 | head -5 || true
          echo "--- HTTPS: iaas.cloud.tencent.com ---"
          curl -sI https://iaas.cloud.tencent.com 2>&1 | head -5 || true
          echo "::endgroup::"

          echo "::group::TCB Login"
          tcb login --apiKeyId "$TCB_SECRET_ID" --apiKey "$TCB_SECRET_KEY" --verbose 2>&1 || true
          echo "::endgroup::"

          echo "::group::TCB Login (try with --flow web fallback)"
          tcb login --apiKeyId "$TCB_SECRET_ID" --apiKey "$TCB_SECRET_KEY" 2>&1
          echo "::endgroup::"
